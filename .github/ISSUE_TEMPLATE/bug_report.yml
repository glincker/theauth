name: Bug report
description: Report a bug in TheAuth
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: TheAuth version
      description: Run `npm list theauth` or check your package.json
      placeholder: "0.0.1"
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - theauth (core)
        - "@theauth/hono"
        - "@theauth/express"
        - "@theauth/nextjs"
        - "@theauth/fastify"
        - "@theauth/nuxt"
        - "@theauth/sveltekit"
        - "@theauth/astro"
        - "@theauth/dashboard"
        - "@theauth/cli"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to trigger the bug
      render: typescript
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - SQLite
        - PostgreSQL
        - MySQL
        - N/A

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.0.0"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, etc."
