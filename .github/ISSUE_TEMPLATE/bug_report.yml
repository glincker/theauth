name: Bug report
description: Report a reproducible bug in theauth or any of its packages
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Fill out the sections below so we can reproduce and fix the issue quickly.
        Please search existing issues before opening a new one.

  - type: input
    id: version
    attributes:
      label: theauth version
      description: Run `npm list @glinr/theauth` or check your package.json
      placeholder: "0.0.1"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Run `node --version`
      placeholder: "22.0.0"
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - "@glinr/theauth (core)"
        - "@glinr/theauth-nextjs"
        - "@glinr/theauth-nextjs-auth"
        - "@glinr/theauth-hono"
        - "@glinr/theauth-express"
        - "@glinr/theauth-fastify"
        - "@glinr/theauth-nuxt"
        - "@glinr/theauth-sveltekit"
        - "@glinr/theauth-astro"
        - "@glinr/theauth-nestjs"
        - "@glinr/theauth-solidstart"
        - "@glinr/theauth-tanstack"
        - "@glinr/theauth-expo"
        - "@glinr/theauth-electron"
        - "@glinr/theauth-react"
        - "@glinr/theauth-vue"
        - "@glinr/theauth-svelte"
        - "@glinr/theauth-ui"
        - "@glinr/theauth-dashboard"
        - "@glinr/theauth-cli"
        - "@glinr/theauth-prisma"
        - "@glinr/theauth-gateway"
        - "Other"
    validations:
      required: true

  - type: input
    id: framework
    attributes:
      label: Framework and version
      description: e.g. Next.js 15.1, SvelteKit 2.x, Hono 4.x
      placeholder: "Next.js 15.1"
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database adapter
      options:
        - "Built-in SQLite"
        - "Built-in PostgreSQL"
        - "Built-in MySQL"
        - "Cloudflare D1"
        - "@glinr/theauth-prisma"
        - "N/A"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or step-by-step instructions to trigger the bug. A link to a minimal reproduction repo is very helpful.
      render: typescript
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.2, Ubuntu 24.04, Windows 11"

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Error messages, stack traces, screenshots, or anything else relevant
